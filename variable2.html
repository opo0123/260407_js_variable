<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>변수 2</title>
    <style></style>
  </head>
  <body>
    <script>
      // 변수 연산
      let x = 200;
      let y = 50;
      // x와 y를 더한 식을 변수에 담기
      let total = x + y;
      // x와 y를 곱한 식을 변수에 담기
      let total2 = x * y;
      // x와 y를 나눈 식을 변수에 담기
      let total3 = x / y;

      console.log(x, y);
      console.log(total);
      console.log(total2);
      console.log(total3);
      // x와 y를 더한 금액은
      document.write(`<p>x와 y를 더한 금액은 <span>${total}</span>입니다.</p>`);
      // x와 y를 곱한 금액은
      document.write(`<p>x와 y를 곱한 금액은 <span>${total2}</span>입니다.</p>`);
      // x와 y를 나눈 금액은
      document.write(`<p>x와 y를 나눈 금액은 <span>${total3}</span>입니다.</p>`);
    </script>
  </body>
</html>
