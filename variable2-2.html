<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>변수 2-2</title>
</head>
<body>
    <script>
        let now = new Date()
        console.log(now)
        let display = now.toDateString()
        let displayTime = now.toLocaleTimeString()
         console.log(display)
         document.write(`오늘 날짜는 ${display}이고, 현재 시각은 ${displayTime}입니다.`)
    </script>
</body>
</html>
